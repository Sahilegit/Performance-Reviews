// Initialize course
function init() {
  loadSection(0);
  updateProgress();
}

// Load a specific module
function loadSection(moduleId) {
  state.currentSection = moduleId;
  const module = modules[moduleId];

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="module active">
      ${module.content}
      <div class="navigation">
        ${moduleId > 0 ? '<button class="btn btn-secondary" onclick="previousSection()">← Previous Section</button>' : ''}
        ${moduleId < state.totalSections ? '<button class="btn btn-primary" onclick="nextSection()">Next Section →</button>' : '<button class="btn btn-primary" onclick="completeCourse()">Complete Course</button>'}
      </div>
    </div>
  `;

  // Attach quiz listeners
  attachQuizListeners();

  // Attach matching activity listeners
  attachMatchingListeners();

  // Scroll to top
  window.scrollTo(0, 0);

  updateProgress();
}

// Attach quiz listeners
function attachQuizListeners() {
  const quizOptions = document.querySelectorAll('.quiz-option');
  quizOptions.forEach(option => {
    option.addEventListener('click', handleQuizAnswer);
  });
}

// Attach matching activity listeners
function attachMatchingListeners() {
  const statements = document.querySelectorAll('.statement-item');
  const ratings = document.querySelectorAll('.rating-target');
  const checkBtn = document.getElementById('checkMatchBtn');
  const resetBtn = document.getElementById('resetMatchBtn');

  if (!statements.length || !ratings.length) return;

  let selectedStatement = null;
  let matches = {};

  statements.forEach(statement => {
    statement.addEventListener('click', () => {
      if (statement.classList.contains('matched')) return;

      // Deselect all statements
      statements.forEach(s => s.classList.remove('selected'));

      // Select this statement
      statement.classList.add('selected');
      selectedStatement = statement;
    });
  });

  ratings.forEach(rating => {
    rating.addEventListener('click', () => {
      if (!selectedStatement || rating.classList.contains('has-match')) return;

      const statementId = selectedStatement.dataset.statement;
      const ratingId = rating.dataset.rating;

      // Store the match
      matches[ratingId] = statementId;

      // Update UI
      const dropZone = rating.querySelector('.drop-zone');
      dropZone.innerHTML = `<div class="dropped-statement">${selectedStatement.textContent}</div>`;

      rating.classList.add('has-match');
      selectedStatement.classList.add('matched');
      selectedStatement.classList.remove('selected');
      selectedStatement = null;

      // Enable check button if all ratings have matches
      if (Object.keys(matches).length === ratings.length) {
        checkBtn.disabled = false;
      }

      // Show reset button as soon as user starts matching
      if (resetBtn) {
        resetBtn.style.display = 'block';
      }
    });
  });

  if (checkBtn) {
    checkBtn.addEventListener('click', () => {
      let correctCount = 0;

      ratings.forEach(rating => {
        const ratingId = rating.dataset.rating;
        const correctStatementId = rating.dataset.correct;
        const matchedStatementId = matches[ratingId];

        if (matchedStatementId === correctStatementId) {
          rating.classList.add('correct');
          correctCount++;
        } else {
          rating.classList.add('incorrect');
        }
      });

      // Register matching activity as completed (use quiz ID 'matching')
      state.quizScores['matching'] = correctCount === ratings.length ? 1 : 0;

      // Show feedback
      const feedback = document.getElementById('matchFeedback');
      if (feedback) {
        if (correctCount === ratings.length) {
          feedback.innerHTML = `
            <p style="color: #0F5F55; font-weight: 600; margin-bottom: 10px;">🎉 Perfect! You matched all statements correctly!</p>
            <p style="color: #595352;">You have a solid understanding of the performance rating levels.</p>
          `;
          feedback.style.borderLeft = '5px solid #0F5F55';
          feedback.style.background = '#d4f4dd';
        } else {
          feedback.innerHTML = `
            <p style="color: #144745; font-weight: 600; margin-bottom: 10px;">You got ${correctCount} out of ${ratings.length} correct.</p>
            <p style="color: #595352;">Review the ratings above to see which matches were correct. Take another look at the performance level descriptions to strengthen your understanding.</p>
          `;
          feedback.style.borderLeft = '5px solid #FDCDBF';
          feedback.style.background = '#fed7d7';
        }
        feedback.classList.add('show');
      }

      checkBtn.disabled = true;
      statements.forEach(s => s.style.pointerEvents = 'none');
      ratings.forEach(r => r.style.pointerEvents = 'none');
    });
  }

  // Reset button functionality
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      // Clear all matches
      matches = {};
      selectedStatement = null;

      // Reset all statements
      statements.forEach(statement => {
        statement.classList.remove('selected', 'matched');
        statement.style.pointerEvents = '';
      });

      // Reset all rating targets
      ratings.forEach(rating => {
        rating.classList.remove('has-match', 'correct', 'incorrect');
        rating.style.pointerEvents = '';
        const dropZone = rating.querySelector('.drop-zone');
        if (dropZone) {
          dropZone.innerHTML = '';
        }
      });

      // Reset buttons and feedback
      checkBtn.disabled = true;
      resetBtn.style.display = 'none';

      const feedback = document.getElementById('matchFeedback');
      if (feedback) {
        feedback.classList.remove('show');
        feedback.innerHTML = '';
      }
    });
  }
}

// Handle quiz answer
function handleQuizAnswer(e) {
  const option = e.target;
  const question = option.closest('.quiz-question');
  const allOptions = question.querySelectorAll('.quiz-option');
  const correctFeedback = question.querySelector('.feedback-correct');
  const incorrectFeedback = question.querySelector('.feedback-incorrect');
  const quizId = question.dataset.quiz;

  // Disable all options
  allOptions.forEach(opt => {
    opt.style.pointerEvents = 'none';
    if (opt.dataset.answer === 'correct') {
      opt.classList.add('correct');
    }
    if (opt === option && opt.dataset.answer === 'wrong') {
      opt.classList.add('incorrect');
    }
  });

  // Show appropriate feedback
  if (option.dataset.answer === 'correct') {
    if (correctFeedback) {
      correctFeedback.classList.add('show', 'correct');
    }
    state.quizScores[quizId] = 1;
  } else {
    if (incorrectFeedback) {
      incorrectFeedback.classList.add('show', 'incorrect');
    }
    state.quizScores[quizId] = 0;
  }
}

// Navigation functions
function nextSection() {
  if (state.currentSection < state.totalSections) {
    if (!state.completedSections.includes(state.currentSection)) {
      state.completedSections.push(state.currentSection);
    }
    loadSection(state.currentSection + 1);
  }
}

function previousSection() {
  if (state.currentSection > 0) {
    loadSection(state.currentSection - 1);
  }
}

// Update progress
function updateProgress() {
  const progress = (state.currentSection / state.totalSections) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('progressText').textContent = `Section ${state.currentSection} of ${state.totalSections}`;
  document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
}

// Complete course
function completeCourse() {
  // Check if all questions have been answered (8 quiz questions total + 1 matching activity)
  const totalRequired = 9; // 8 quiz questions + 1 matching activity
  const totalAnswered = Object.keys(state.quizScores).length;

  if (totalAnswered < totalRequired) {
    alert('Please complete all knowledge checks and activities before finishing the course.');
    return;
  }

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="module active">
      <div class="completion-card">
        <div class="completion-icon">🎉</div>
        <h2>Congratulations!</h2>
        <p style="font-size: 18px; color: #595352; margin-bottom: 30px;">You've completed the Performance Review Training course</p>

        <div class="card" style="text-align: left; background: white; border: 2px solid #0F5F55;">
          <h3>What's Next?</h3>
          <div class="checklist">
            <div class="checklist-item">
              Review the resources in SuccessFactors (Performance & Career Article, Skills Matrix)
            </div>
            <div class="checklist-item">
              Mark your calendar for your first performance review (around week 9-10 of training)
            </div>
            <div class="checklist-item">
              Start using your Development Journal to track your progress and achievements
            </div>
            <div class="checklist-item">
              Reach out to your supervisor if you have any questions about your review schedule
            </div>
          </div>
        </div>

        <div class="highlight-box" style="margin-top: 30px;">
          Remember: Performance reviews are a partnership. They're here to help you grow, succeed, and reach your goals at ecobee.
        </div>

        <button class="btn btn-primary" onclick="init()" style="margin-top: 30px;">Restart Course</button>
      </div>
    </div>
  `;

  // Update progress to 100%
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = `Course Complete!`;
  document.getElementById('progressPercent').textContent = '100%';

  window.scrollTo(0, 0);
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', init);
</script>
